[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[functions."pms-sync"]
  schedule = "0 */4 * * *"

# Environment variables that must be set in the Netlify dashboard:
# ANTHROPIC_API_KEY
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# CRON_SECRET            — random secret; authenticates /api/v1/cron/pms-sync and pms-sync-bg background function
# URL                    — set automatically by Netlify (deploy URL); used to invoke pms-sync-bg
