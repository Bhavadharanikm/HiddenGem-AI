[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[functions."pms-sync"]
  schedule = "0 */4 * * *"

# Environment variables that must be set in the Netlify dashboard:
# ANTHROPIC_API_KEY
# NEXT_PUBLIC_SUPABASE_URL
# NEXT_PUBLIC_SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# OPENAI_API_KEY
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN
# CRON_SECRET            — random secret used to authenticate the /api/v1/cron/pms-sync route
# URL                    — set automatically by Netlify (deploy URL); used by the pms-sync scheduled function
